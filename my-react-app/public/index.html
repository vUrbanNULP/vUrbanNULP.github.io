<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Веб-сайт платформи для моніторингу здоров'я та фізичної активності"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Зверніть увагу на використання %PUBLIC_URL% в тегах link вище.
      Це буде замінено на URL публічної папки під час збірки.
      Лише файли всередині папки `public` доступні звідси.

      Ви можете додати будь-які мета-теги тут.

      Цей файл HTML є шаблоном.
      Якщо ви відкриєте його безпосередньо в браузері, ви побачите порожню сторінку.

      Щоб увімкнути JavaScript функції для цього файлу, перегляньте:
        %PUBLIC_URL%/index.js.
      Зв'язки в body в кінці файлу будуть автоматично додані.
    -->
    <title>Мій Здоровий Спосіб Життя</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      Цей HTML-файл слугує шаблоном, який використовується для показу
      "порожньої" сторінки в браузері.

      JavaScript бандл буде автоматично вставлено в <body>.

      Ви можете додати до цього файлу будь-які додаткові <script> tags,
      але способи їх додавання можуть відрізнятися,
      якщо ви хочете використовувати, наприклад, зворотній проксі.

      Щоб почати розробку, запустіть `npm start` або `yarn start`.
      Для збірки, `npm run build` або `yarn build`.
    -->
  </body>
</html>
